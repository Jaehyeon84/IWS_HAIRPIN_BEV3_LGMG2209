; config.ini
[DEFAULT]
; if communication mode is not signal, this will be deleted.
PID_PATH = /Users/ckddyd777/Desktop/vision.ai.client/.pid
LOG_CONF_PATH = ./rsc/log_conf/logger_json.txt
COMM_MODE = TCP
PORT = 9998

[HEAT_EXCH]
DATABOX_MODE = MEMORY
BUNCH_HEADER_SIZE = 12
IMG_HEADER_SIZE = 32
;SharedMemory size. (MB)
SHM_SIZE = 20
;Input image channel it must be 1 or 3, alpha channel is not considered..
IMG_CHANNEL = 1

[MODEL]
;Resize information, it depends on model file.
IMG_WIDTH = 48
IMG_HEIGHT = 48
IMG_CHANNEL = 3

MODEL = KERAS
MODEL_NUM = 5
PATH = ./rsc/model_files

m0.name = cam0
m0.algo = keras
m0.img_width = 48
m0.img_height = 48
m0.channel = 3
m0.version = 0.1


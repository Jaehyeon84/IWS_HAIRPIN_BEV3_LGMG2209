[WeldAfterInspect_77A]

'################  공통  ################  
'1:하부, 2:상부
Type=1

UseLoadBinFileTest=0
DeleteBinFile=0

UseKeepingOK=0
ForcedOK=0

'용접후검사 Area 사용 (1:ON, 0:OFF)
UseArea=0
JudgementCriteriaArea=0
JudgementCriteriaArea2=0

'용접후검사 핀 높이편차 사용
UsePinHeightDiff=0
JudgementCriteriaHeightDiff=0.6

'용접후검사 Type6  사용 (1:ON, 0:OFF)
UseType6=0
JudgementCriteriaDepthDiff=0.5

'용접후검사 비드폭 사용 (1:ON, 0:OFF)
UseBeadWidth=1
'생산기준 : 2.8
'JudgementCriteriaBeadWidth=2.85
JudgementCriteriaBeadWidth=3

'Show Overlay on Output Image
ShowOverlay = 1

'Use Hubis dl model or LG Dx-center model
UseHubisDLModel = 1


'Use Previous Stator's Inspection Result. For stator with same lotid, we inspects only rework beads
UsePreviousResult=1

'Use Ok judgement limit
UseOkLimit=1

'Threshold for ok-judgement limit (allowable range 0.34 ~ 1.0)
OkLimit=0.7

'################  모델별(77A 하부 - 8레이어)  ################
NumberofLayers=8
NumberofSlots=96

NumberingDirection=1
NumberingOffset=0

UseSkipBeadShort=1

'3D 딥러닝 관련
UseDeepLearning=1
UseSaveDLImage=1
UseSaveBSImage=1
UseDLOKOldResult=1
UseSaveMinPixelCountTestImage=0
DLPreProcessThreshold=50
DLPreProcessMinPixelCount=300
DLCropImageSize=160
DLOkPercentArea=0
DLOkPercentAreaThreshold=0

ImaqThresholdMin=10000
ImaqThresholdMax=65535

UseConstruction=1
UseFilterNo=1
MinBandFactor=1.400000
MinHeightThreshold=0.500000

RemoveParticleThreshold=1000
IsBeadThresholdMin=2000
IsBeadThresholdMax=20000
IsBeadShortThreshold=6000

JudgementCriteriaBeadWidth1=0.5
JudgementCriteriaBeadWidth2=0.5
BeadWidthROIRate=1.8
BeadWidthOffset=0.3
BeadWidthRate=1.05
MinimumBeadWidth=0

UseCircularity=0
JudgementCriteriaCircularity=0.1

'Height C/AVG 등의 값이 해당 판정값 미만일 경우 FAIL 처리 (1:ON, 0:OFF)
UseHeightFail=0
JudgementCriteriaHeightC=2.0
JudgementCriteriaHeightAVG=1.5

